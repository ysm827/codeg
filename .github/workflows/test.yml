name: Test

on:
  push:
    branches:
      - main
  pull_request:

env:
  RUST_BACKTRACE: short
  # Refuse to silently regenerate snapshots in CI — any drift must be
  # accepted locally with `cargo insta review` and committed.
  INSTA_UPDATE: "no"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + vitest + build)
    # Frontend tests are OS-independent (jsdom + pure TS), keep on Linux
    # to save CI minutes.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm eslint .

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Static export build
        run: pnpm build

  rust:
    name: Rust ${{ matrix.mode }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
        mode: [desktop, server]
        include:
          - mode: desktop
            cargo_args: ""
          - mode: server
            # Server build is feature-gated off the Tauri runtime; no
            # need for webkit/appindicator system libs.
            cargo_args: "--no-default-features --bin codeg-server --lib"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: test-${{ matrix.os }}-${{ matrix.mode }}

      - name: Install Linux desktop dependencies
        # Only the Linux desktop build needs webkit/appindicator. Windows
        # ships WebView2 with the OS; macOS uses WKWebView from the SDK.
        if: matrix.os == 'ubuntu-22.04' && matrix.mode == 'desktop'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: cargo test
        working-directory: src-tauri
        run: cargo test ${{ matrix.cargo_args }}

      - name: cargo clippy
        # Clippy on each (os, mode) cell — desktop covers tauri-only code
        # paths, server covers cfg-gated server-only code. Treat warnings
        # as errors now that the 8 pre-existing advisories are cleared.
        working-directory: src-tauri
        run: cargo clippy --all-targets ${{ matrix.cargo_args }} -- -D warnings
